<!DOCTYPE html>
<html>
<head>
  <title>HabeebGPT</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    /* HEADER */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    #upgradeBtn {
      background: #22c55e;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #chat {
      max-width: 700px;
      margin: auto;
      padding: 20px;
      padding-bottom: 120px;
    }

    .msg {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #1e293b;
    }

    .typing {
      opacity: 0.6;
      font-style: italic;
    }

    /* INPUT AREA */
    #inputArea {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 700px;
      display: flex;
      background: #1e293b;
      border-radius: 30px;
      padding: 8px;
    }

    #input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
      padding: 10px;
    }

    #sendBtn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div id="header">
  <h3>HabeebGPT</h3>
  <button id="upgradeBtn" onclick="upgrade()">Upgrade 🚀</button>
</div>

<!-- CHAT -->
<div id="chat"></div>

<!-- INPUT -->
<div id="inputArea">
  <input id="input" placeholder="Message HabeebGPT..." />
  <button id="sendBtn" onclick="send()">➤</button>
</div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  // LOAD SAVED CHAT
  const saved = localStorage.getItem("chat");
  if (saved) chat.innerHTML = saved;

  // ENTER KEY
  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") send();
  });

  function upgrade() {
    alert("Upgrade feature coming soon 💰");
  }

  async function send() {
    if (!input.value.trim()) return;

    // USER MSG
    const userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.textContent = input.value;
    chat.appendChild(userMsg);

    const message = input.value;
    input.value = "";

    // TYPING
    const typing = document.createElement("div");
    typing.className = "msg bot typing";
    typing.textContent = "HabeebGPT is typing...";
    chat.appendChild(typing);

    window.scrollTo(0, document.body.scrollHeight);

    // FETCH
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    typing.remove();

    // BOT MSG (STREAM EFFECT)
    const botMsg = document.createElement("div");
    botMsg.className = "msg bot";
    chat.appendChild(botMsg);

    let text = data.message;
    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        botMsg.textContent += text.charAt(i);
        i++;
        setTimeout(typeWriter, 15); // speed
      }
    }

    typeWriter();

    // SAVE CHAT
    localStorage.setItem("chat", chat.innerHTML);

    window.scrollTo(0, document.body.scrollHeight);
  }
</script>

</body>
</html>
