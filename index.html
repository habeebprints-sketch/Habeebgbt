<!DOCTYPE html>
<html>
<head>
  <title>HabeebGPT</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    #chat {
      max-width: 700px;
      margin: auto;
      padding: 20px;
      padding-bottom: 100px;
    }

    .msg {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #2563eb;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #1e293b;
      margin-right: auto;
    }

    /* INPUT BAR (ChatGPT style) */
    #inputArea {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 700px;
      display: flex;
      align-items: center;
      background: #1e293b;
      border-radius: 30px;
      padding: 8px;
    }

    #input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 16px;
    }

    /* ROUND SEND BUTTON */
    #sendBtn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="chat"></div>

  <!-- INPUT BAR -->
  <div id="inputArea">
    <input id="input" placeholder="Message HabeebGPT..." />
    <button id="sendBtn" onclick="send()">➤</button>
  </div>

  <script>
    async function send() {
      const input = document.getElementById("input");
      const chat = document.getElementById("chat");

      if (!input.value.trim()) return;

      // USER MESSAGE
      const userMsg = document.createElement("div");
      userMsg.className = "msg user";
      userMsg.textContent = input.value;
      chat.appendChild(userMsg);

      const message = input.value;
      input.value = "";

      // FETCH FROM BACKEND
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await res.json();

      // BOT MESSAGE
      const botMsg = document.createElement("div");
      botMsg.className = "msg bot";
      botMsg.textContent = data.message || "No response";
      chat.appendChild(botMsg);

      // AUTO SCROLL
      window.scrollTo(0, document.body.scrollHeight);
    }
  </script>

</body>
</html>
