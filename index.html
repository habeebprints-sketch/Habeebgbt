<!DOCTYPE html>
<html>
<head>
  <title>HabeebGPT</title>
  <style>
    body { background:#0f172a; color:white; font-family:sans-serif; }
    #chat { max-width:600px; margin:auto; padding:20px; }
    .msg { margin:10px 0; padding:10px; border-radius:10px; }
    .user { background:#2563eb; text-align:right; }
    .bot { background:#1e293b; }
    input { width:80%; padding:10px; }
    button { padding:10px; }
  </style>
</head>
<body>

<div id="chat"></div>

<div style="position:fixed; bottom:10px; width:100%; text-align:center;">
  <input id="input" placeholder="Type a message..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.textContent = input.value;
  chat.appendChild(userMsg);

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: input.value })
  });

  const data = await res.json();

  const botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.textContent = data.message || "No response";
  chat.appendChild(botMsg);

  input.value = "";
}
</script>

</body>
</html>
