<!DOCTYPE html>
<html>
<head>
  <title>HabeebGPT</title>

  <style>
    body {
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
}

#chat {
  max-width: 600px;
  margin: auto;
  padding: 10px;
  padding-bottom: 100px;
}

.msg {
  margin: 10px;
  padding: 12px 16px;
  border-radius: 20px;
  max-width: 80%;
}

.user {
  background: #2563eb;
  margin-left: auto;
  text-align: right;
}

.bot {
  background: #1e293b;
  margin-right: auto;
}

/* 🔥 ChatGPT-style input */
.input-box {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  width: 95%;
  max-width: 600px;
  background: #1e293b;
  border-radius: 30px;
  display: flex;
  padding: 10px;
}

.input-box input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 16px;
  padding: 10px;
}

.input-box button {
  background: #2563eb;
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 50%;
  width: 45px;
  height: 45px;
}
    }
    }

    #chat {
      max-width: 600px;
      margin: auto;
      padding: 10px;
      padding-bottom: 80px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
    }

    .user {
      background: #2563eb;
      text-align: right;
    }

    .bot {
      background: #1e293b;
    }

    .input-area {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #0f172a;
      padding: 10px;
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      margin-left: 5px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Type a message..." />
    <button onclick="send()">Send</button>
  </div>

  <script>
    async function send() {
      const input = document.getElementById("input");
      const chat = document.getElementById("chat");

      if (!input.value) return;

      // User message
      const userMsg = document.createElement("div");
      userMsg.className = "msg user";
      userMsg.textContent = input.value;
      chat.appendChild(userMsg);

      // Call backend
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: input.value
        })
      });

      const data = await res.json();

      // Bot message
      const botMsg = document.createElement("div");
      botMsg.className = "msg bot";
      botMsg.textContent = data.message || "No response";
      chat.appendChild(botMsg);

      input.value = "";
      chat.scrollTop = chat.scrollHeight;
    }
  </script>

</body>
</html>
